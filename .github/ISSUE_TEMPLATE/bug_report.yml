name: Bug report
description: Report a reproducible bug or regression
title: '[Bug]: '
labels:
    - bug
    - needs-triage
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report this issue.
    - type: textarea
      id: summary
      attributes:
          label: What happened?
          description: Describe the bug and what you expected to happen instead.
          placeholder: A concise summary of the bug.
      validations:
          required: true
    - type: textarea
      id: reproduction
      attributes:
          label: Reproduction steps
          description: Share the smallest set of steps needed to reproduce the issue.
          placeholder: |
              1. Run ...
              2. Open ...
              3. Click ...
              4. See error ...
      validations:
          required: true
    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: Include OS, Node.js, pnpm, browser, and app/module details if relevant.
          placeholder: macOS 15, Node 22, pnpm 10, Chrome 136, apps/blog
    - type: textarea
      id: logs
      attributes:
          label: Logs, screenshots, or stack traces
          description: Paste anything helpful for debugging.
          render: shell
