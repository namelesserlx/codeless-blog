version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: Asia/Shanghai
      # Keep Dependabot security updates enabled in GitHub settings,
      # but stop routine version bump PRs for this repository.
      open-pull-requests-limit: 0
    - package-ecosystem: docker
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:30'
          timezone: Asia/Shanghai
      open-pull-requests-limit: 0
